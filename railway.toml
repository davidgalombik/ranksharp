[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Wrap in `sh -c` so ${PORT:-8000} is shell-expanded. Railway passes the
# string to exec directly otherwise and uvicorn receives the literal
# '${PORT:-8000}' as the port value, failing to start.
startCommand = "sh -c 'uvicorn api.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
