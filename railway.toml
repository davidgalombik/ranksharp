[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No project-wide startCommand: each Railway service sets its own
# Custom Start Command in the UI (rankshaw = uvicorn, dynamic-reprieve =
# celery worker, zooming-dream = celery beat or worker, etc). A shared
# startCommand here would forcibly reset every service to uvicorn any
# time this file was touched — we found that out the hard way when
# dynamic-reprieve silently stopped being the Celery worker. rankshaw
# falls back to the Dockerfile's CMD (which is uvicorn with `sh -c`)
# if no Custom Start Command is set.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
