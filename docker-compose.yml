version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: trendtracker
      POSTGRES_USER: trendtracker
      POSTGRES_PASSWORD: trendtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trendtracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://trendtracker:trendtracker@postgres:5432/trendtracker
      - DATABASE_URL_SYNC=postgresql://trendtracker:trendtracker@postgres:5432/trendtracker
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - raw_data:/app/raw_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=4 -Q scrape,analysis,reports
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://trendtracker:trendtracker@postgres:5432/trendtracker
      - DATABASE_URL_SYNC=postgresql://trendtracker:trendtracker@postgres:5432/trendtracker
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - raw_data:/app/raw_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  aldi-worker:
    build: ./backend
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=6 -Q aldi -n aldi-worker@%h
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://trendtracker:trendtracker@postgres:5432/trendtracker
      - DATABASE_URL_SYNC=postgresql://trendtracker:trendtracker@postgres:5432/trendtracker
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - raw_data:/app/raw_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: ./backend
    command: celery -A tasks.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://trendtracker:trendtracker@postgres:5432/trendtracker
      - DATABASE_URL_SYNC=postgresql://trendtracker:trendtracker@postgres:5432/trendtracker
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - API_URL=http://api:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - api

volumes:
  postgres_data:
  raw_data:
